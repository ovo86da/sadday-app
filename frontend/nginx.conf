server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------------------------
    # Security headers — aplicados a todas las respuestas (flag "always"
    # los incluye también en 4xx/5xx, no solo en 2xx/3xx).
    #
    # NOTA nginx: add_header en un bloque location hijo ANULA la herencia del
    # padre. Por eso los headers se repiten en el bloque de assets de abajo.
    # -------------------------------------------------------------------------

    # CSP para React + Vite + Tailwind + Radix UI + Recharts + Sonner:
    #   script-src 'self' 'unsafe-eval' — solo scripts del mismo origen;
    #                                  'unsafe-eval' requerido porque Recharts usa
    #                                  new Function() internamente para labels.
    #                                  El inline modulepreload polyfill de Vite está
    #                                  deshabilitado en vite.config.ts.
    #   style-src 'self' 'unsafe-inline' — Radix UI, Recharts y Sonner inyectan
    #                                  inline styles vía JS para posicionamiento
    #                                  dinámico de overlays.
    #   style-src-elem               — directiva explícita para <style> y <link>;
    #                                  algunos browsers (Firefox) no hacen fallback
    #                                  a style-src y caen a default-src.
    #   img-src 'self' data: blob:   — qrcode.react genera data URIs; blob: para
    #                                  posibles previews de imagen.
    #   connect-src 'self'           — todas las llamadas API van al mismo origen
    #                                  (nginx proxea /api → backend).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-attr 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; worker-src 'none'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    add_header X-Content-Type-Options  "nosniff"                          always;
    add_header X-Frame-Options         "DENY"                             always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Resolver de Docker — fuerza re-resolución DNS en cada request
    # (sin esto Nginx cachea la IP del contenedor api al arrancar
    # y devuelve 502 si el contenedor se reinicia y cambia de IP)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy al backend — todas las llamadas API van al contenedor "api"
    location /api {
        set $backend http://api:8080;
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA: cualquier ruta no encontrada cae en index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché agresiva para assets con hash en el nombre (JS, CSS, fuentes, imágenes).
    # add_header aquí anula la herencia del bloque server — se repiten security headers.
    location ~* \.(?:js|css|woff2?|png|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";

        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-attr 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; worker-src 'none'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

        add_header X-Content-Type-Options  "nosniff"                          always;
        add_header X-Frame-Options         "DENY"                             always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
        add_header Permissions-Policy      "camera=(), microphone=(), geolocation=(), payment=()" always;
    }
}
