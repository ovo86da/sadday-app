server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------------------------
    # Security headers — aplicados a todas las respuestas (flag "always"
    # los incluye también en 4xx/5xx, no solo en 2xx/3xx).
    #
    # NOTA nginx: add_header en un bloque location hijo ANULA la herencia del
    # padre. Por eso los headers se repiten en el bloque de assets de abajo.
    # -------------------------------------------------------------------------

    # CSP para React + Vite + Tailwind + Radix UI + Recharts + Sonner:
    #   script-src 'self'            — solo scripts del mismo origen; el inline
    #                                  modulepreload polyfill de Vite está
    #                                  deshabilitado en vite.config.ts.
    #   style-src 'self' 'unsafe-inline' — Radix UI, Recharts y Sonner inyectan
    #                                  inline styles vía JS para posicionamiento
    #                                  dinámico de overlays.
    #   img-src 'self' data: blob:   — qrcode.react genera data URIs; blob: para
    #                                  posibles previews de imagen.
    #   connect-src 'self'           — todas las llamadas API van al mismo origen
    #                                  (nginx proxea /api → backend).
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self'; \
         style-src 'self' 'unsafe-inline'; \
         img-src 'self' data: blob:; \
         font-src 'self'; \
         connect-src 'self'; \
         worker-src 'none'; \
         frame-src 'none'; \
         object-src 'none'; \
         base-uri 'self'; \
         form-action 'self'; \
         frame-ancestors 'none';"
        always;

    add_header X-Content-Type-Options  "nosniff"                          always;
    add_header X-Frame-Options         "DENY"                             always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=(), payment=()" always;

    # SPA: cualquier ruta no encontrada cae en index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché agresiva para assets con hash en el nombre (JS, CSS, fuentes, imágenes).
    # add_header aquí anula la herencia del bloque server — se repiten security headers.
    location ~* \.(?:js|css|woff2?|png|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";

        add_header Content-Security-Policy
            "default-src 'self'; \
             script-src 'self'; \
             style-src 'self' 'unsafe-inline'; \
             img-src 'self' data: blob:; \
             font-src 'self'; \
             connect-src 'self'; \
             worker-src 'none'; \
             frame-src 'none'; \
             object-src 'none'; \
             base-uri 'self'; \
             form-action 'self'; \
             frame-ancestors 'none';"
            always;

        add_header X-Content-Type-Options  "nosniff"                          always;
        add_header X-Frame-Options         "DENY"                             always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
        add_header Permissions-Policy      "camera=(), microphone=(), geolocation=(), payment=()" always;
    }
}
