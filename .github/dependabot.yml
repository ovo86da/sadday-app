version: 2
updates:

  # Dependencias Maven del backend
  - package-ecosystem: "maven"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "java"
    ignore:
      # Spring Boot se actualiza manualmente para controlar el timing
      - dependency-name: "org.springframework.boot:*"
        update-types: ["version-update:semver-major"]

  # Dependencias npm del frontend (pnpm — Dependabot lo gestiona via ecosystem npm)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"

  # Dependencias npm del MCP server
  - package-ecosystem: "npm"
    directory: "/mcp"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "mcp"

  # Actions de GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
