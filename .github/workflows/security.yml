name: Security Audit

on:
  push:
    branches: [main]
    paths:
      - "backend/pom.xml"
      - "frontend/pnpm-lock.yaml"
      - "mcp/package-lock.json"
      - ".github/workflows/security.yml"
  schedule:
    # Lunes a las 07:00 UTC
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Snyk — vulnerabilidades en dependencias Maven
  # Requiere secret: SNYK_TOKEN (obtener en snyk.io → Account Settings → API Token)
  # ─────────────────────────────────────────────────────────────────────────────
  snyk:
    name: Snyk Dependency Scan
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      contents: read
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/maven@master
        with:
          args: >-
            --severity-threshold=high
            --sarif-file-output=snyk.sarif
            --project-name=sadday-app
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true   # No bloquear en hallazgos; visibilidad vía SARIF

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif

  # ─────────────────────────────────────────────────────────────────────────────
  # Snyk — vulnerabilidades en dependencias frontend (pnpm)
  # Requiere secret: SNYK_TOKEN
  # ─────────────────────────────────────────────────────────────────────────────
  snyk-frontend:
    name: Snyk — Frontend Dependencies
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Snyk
        uses: snyk/actions/node@master
        with:
          args: >-
            --severity-threshold=high
            --sarif-file-output=snyk-frontend.sarif
            --project-name=sadday-frontend
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: frontend/snyk-frontend.sarif

  # ─────────────────────────────────────────────────────────────────────────────
  # Snyk — vulnerabilidades en dependencias MCP (npm)
  # Requiere secret: SNYK_TOKEN
  # ─────────────────────────────────────────────────────────────────────────────
  snyk-mcp:
    name: Snyk — MCP Dependencies
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      contents: read
    defaults:
      run:
        working-directory: mcp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Snyk
        uses: snyk/actions/node@master
        with:
          args: >-
            --severity-threshold=high
            --sarif-file-output=snyk-mcp.sarif
            --project-name=sadday-mcp
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: mcp/snyk-mcp.sarif

  # ─────────────────────────────────────────────────────────────────────────────
  # OWASP Dependency Check — escaneo contra base de datos NVD
  # No requiere cuentas externas. Primera ejecución tarda ~10 min (descarga NVD).
  # ─────────────────────────────────────────────────────────────────────────────
  owasp-dep-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      contents: read
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: nvd-cache-${{ github.run_id }}
          restore-keys: nvd-cache-

      - name: Run OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:12.1.1:check \
            --no-transfer-progress -B \
            -DfailBuildOnCVSS=9 \
            -DsuppressionFile=.owasp-suppressions.xml \
            -Dformat=ALL \
            -DnvdApiKey=${{ secrets.NVD_API_KEY }}
        continue-on-error: true   # No bloquear en hallazgos — revisar reporte

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dep-check-report
          path: backend/target/dependency-check-report.html
          retention-days: 30

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: backend/target/dependency-check-report.sarif
