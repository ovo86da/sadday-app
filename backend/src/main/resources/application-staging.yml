# =============================================================================
# Perfil Staging — VM Ubuntu en Proxmox
# Misma configuración que prod salvo ajustes de Staging indicados abajo.
# =============================================================================

spring:
  datasource:
    url:      jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle:      2

  jpa:
    show-sql: false

  mail:
    host:     ${MAIL_HOST:localhost}
    port:     ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: false   # Mailpit no requiere autenticación SMTP

sadday:
  security:
    # En staging, nginx corre en un contenedor Docker separado en la red bridge
    # (172.18.0.x). El backend necesita confiar en esa IP para leer X-Forwarded-For
    # y resolver la IP real del cliente (no la del contenedor nginx).
    trusted-proxy-cidrs:
      - "127.0.0.1/32"    # loopback (por si se prueba sin Docker)
      - "::1/128"          # IPv6 loopback
      - "172.16.0.0/12"   # redes bridge de Docker (172.16.x.x – 172.31.x.x)

  auth:
    cookie-secure: false   # HTTP en Staging (sin certificado TLS obligatorio)

  mail:
    from:    ${MAIL_FROM:noreply@staging.sadday.local}
    app-url: ${APP_URL:http://staging.sadday.local}

  admin:
    username:         ${ADMIN_USERNAME:admin}
    initial-password: ${ADMIN_INITIAL_PASSWORD}

  s3:
    bucket:     ${S3_BUCKET:-sadday-staging}
    region:     ${S3_REGION:us-east-1}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
    endpoint:   ${S3_ENDPOINT:http://minio:9000}   # MinIO local en Staging

management:
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false   # Mailpit no requiere auth; este check siempre falla en staging

logging:
  level:
    com.sadday: DEBUG        # Más verbose en Staging
    root:       WARN
