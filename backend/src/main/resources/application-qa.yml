# =============================================================================
# Perfil QA — VM Ubuntu en Proxmox
# Misma configuración que prod salvo ajustes de QA indicados abajo.
# =============================================================================

spring:
  datasource:
    url:      jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle:      2

  jpa:
    show-sql: false

  mail:
    host:     ${MAIL_HOST:localhost}
    port:     ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:dev}
    password: ${MAIL_PASSWORD:dev}

sadday:
  auth:
    cookie-secure: false   # HTTP en QA (sin certificado TLS obligatorio)

  mail:
    from:    ${MAIL_FROM:noreply@qa.sadday.local}
    app-url: ${APP_URL:http://qa.sadday.local}

  admin:
    username:         ${ADMIN_USERNAME:admin}
    initial-password: ${ADMIN_INITIAL_PASSWORD}

  s3:
    bucket:     ${S3_BUCKET:-sadday-qa}
    region:     ${S3_REGION:us-east-1}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
    endpoint:   ${S3_ENDPOINT:http://minio:9000}   # MinIO local en QA

management:
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.sadday: DEBUG        # Más verbose en QA
    root:       WARN
  file:
    name: /app/logs/sadday-app.log
